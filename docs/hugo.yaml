baseURL: "https://awsdoctor.compacompila.com/"
title: "AWS Doctor"
enableRobotsTXT: true

module:
  imports:
    - path: github.com/imfing/hextra

defaultContentLanguage: en
languages:
  en:
    languageName: English
    languageCode: en-us
    weight: 1
    title: "AWS Doctor - AWS Security & Cost Audit CLI"
    params:
      description: "Powerful open-source CLI to audit security, costs, and best practices in AWS. Identify idle resources, analyze cost trends, and optimize your infrastructure."
      keywords: ["AWS", "CLI", "Audit", "Security", "Cost Optimization", "FinOps", "Cloud Waste", "EC2", "S3", "Open Source"]
      images: ["/images/logo.webp"]
    menu:
      main:
        - name: "Documentation"
          url: "/docs/"
          weight: 10
        - name: "GitHub"
          url: "https://github.com/elC0mpa/aws-doctor"
          weight: 20
          params:
            icon: github
        - name: "Theme Toggle"
          weight: 30
          params:
            type: theme-toggle
        - name: "Language"
          weight: 40
          params:
            type: language-switch
  es:
    languageName: Español
    languageCode: es-es
    weight: 2
    title: "AWS Doctor - CLI para Auditoría de Seguridad y Costos en AWS"
    params:
      description: "Potente CLI de código abierto para auditar seguridad, costos y mejores prácticas en AWS. Identifica recursos inactivos, analiza tendencias de costos y optimiza tu infraestructura."
      keywords: ["AWS", "CLI", "Auditoría", "Seguridad", "Optimización de Costos", "FinOps", "Desperdicio en la Nube", "EC2", "S3", "Código Abierto"]
      images: ["/images/logo.webp"]
    menu:
      main:
        - name: "Documentación"
          url: "/es/docs/"
          weight: 10
        - name: "GitHub"
          url: "https://github.com/elC0mpa/aws-doctor"
          weight: 20
          params:
            icon: github
        - name: "Cambiar Tema"
          weight: 30
          params:
            type: theme-toggle
        - name: "Idioma"
          weight: 40
          params:
            type: language-switch

params:
  description: "Powerful open-source CLI to audit security, costs, and best practices in AWS."
  images: ["/images/logo.webp"]
  navbar:
    displayLogo: true
    displaySearch: true
    width: wide
    logo:
      path: favicon.svg
      dark: favicon-dark.svg
      link: /
      width: 40
      height: 40
  page:
    width: wide
  footer:
    displayCopyright: false
  theme:
    default: system
    displayToggle: false

markup:
  goldmark:
    renderer:
      unsafe: true

services:
  googleAnalytics:
    ID: G-FV607T8ZZH
